<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Dashboard — Business Toolkit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#2563EB', dark: '#1D4ED8' },
            surface: '#F8FAFC', ink: '#1E293B', muted: '#64748B'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface font-sans text-ink min-h-screen pb-24" data-page="dashboard">

<!-- HEADER -->
<header class="bg-white shadow-sm sticky top-0 z-30 border-b border-slate-100">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 bg-gradient-to-br from-primary to-blue-700 rounded-xl flex items-center justify-center shadow-md">
        <i class="fas fa-briefcase text-white text-base"></i>
      </div>
      <div>
        <span class="font-bold text-ink text-base leading-none block">Business Toolkit</span>
        <span class="text-[10px] text-primary font-bold leading-none uppercase tracking-wider">Indian Sellers</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div id="dash-user-avatar" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-xs font-bold text-primary border border-slate-200"></div>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6">

  <!-- GREETING -->
  <section class="mb-6">
    <h1 class="text-2xl font-extrabold text-ink mb-1" id="greeting-text">Hello! 👋</h1>
    <p class="text-sm text-muted">Here's how your business is doing today.</p>
  </section>

  <!-- KPI CARDS -->
  <section class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
    <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
      <p class="text-[11px] text-muted font-bold uppercase tracking-wider mb-1">Today's Sales</p>
      <p id="kpi-today-sales" class="text-xl font-extrabold text-ink">₹0</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
      <p class="text-[11px] text-muted font-bold uppercase tracking-wider mb-1">Week Revenue</p>
      <p id="kpi-week-revenue" class="text-xl font-extrabold text-ink">₹0</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
      <p class="text-[11px] text-muted font-bold uppercase tracking-wider mb-1">Est. Profit</p>
      <p id="kpi-profit" class="text-xl font-extrabold text-green-600">₹0</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm">
      <p class="text-[11px] text-muted font-bold uppercase tracking-wider mb-1">Invoices</p>
      <p id="kpi-invoices" class="text-xl font-extrabold text-primary">0</p>
    </div>
  </section>

  <!-- QUICK ACTIONS -->
  <section class="mb-6">
    <h2 class="text-sm font-bold text-ink mb-3 uppercase tracking-wider">Quick Actions</h2>
    <div class="grid grid-cols-3 gap-3">
      <a href="invoice-generator.html" class="bg-primary text-white rounded-2xl p-4 flex flex-col items-center justify-center text-center shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
        <i class="fas fa-plus-circle text-2xl mb-2"></i>
        <span class="text-xs font-bold">New Invoice</span>
      </a>
      <button onclick="openQuotation()" class="bg-emerald-500 text-white rounded-2xl p-4 flex flex-col items-center justify-center text-center shadow-lg shadow-emerald-500/20 hover:scale-105 transition-transform">
        <i class="fas fa-file-signature text-2xl mb-2"></i>
        <span class="text-xs font-bold">Quotation</span>
      </button>
      <button onclick="openExpense()" class="bg-rose-500 text-white rounded-2xl p-4 flex flex-col items-center justify-center text-center shadow-lg shadow-rose-500/20 hover:scale-105 transition-transform">
        <i class="fas fa-wallet text-2xl mb-2"></i>
        <span class="text-xs font-bold">Add Expense</span>
      </button>
    </div>
  </section>

  <!-- ANALYTICS & TOOLS -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Revenue Trend -->
    <div class="bg-white rounded-3xl border border-slate-100 p-5 shadow-sm">
      <h3 class="text-sm font-bold text-ink mb-4 uppercase tracking-wider">Revenue Trend</h3>
      <div id="rev-bars" class="flex items-end gap-2 h-32">
        <!-- bars injected by JS -->
      </div>
      <div class="flex justify-between mt-2 text-[10px] text-muted font-bold">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
    </div>

    <!-- Popular Tools -->
    <div class="bg-white rounded-3xl border border-slate-100 p-5 shadow-sm">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-bold text-ink uppercase tracking-wider">Popular Tools</h3>
        <a href="tools.html" class="text-xs text-primary font-bold">View All</a>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <a href="tools.html#profit-calc" class="bg-slate-50 rounded-2xl p-3 flex items-center gap-3 hover:bg-slate-100 transition-colors">
          <div class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center"><i class="fas fa-chart-line text-sm"></i></div>
          <span class="text-xs font-bold">Profit Calc</span>
        </a>
        <a href="tools.html#gst-calc" class="bg-slate-50 rounded-2xl p-3 flex items-center gap-3 hover:bg-slate-100 transition-colors">
          <div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center"><i class="fas fa-percent text-sm"></i></div>
          <span class="text-xs font-bold">GST Calc</span>
        </a>
        <a href="invoice-converter.html" class="bg-slate-50 rounded-2xl p-3 flex items-center gap-3 hover:bg-slate-100 transition-colors">
          <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center"><i class="fas fa-file-excel text-sm"></i></div>
          <span class="text-xs font-bold">Inv → Excel</span>
        </a>
        <a href="tools.html#whatsapp" class="bg-slate-50 rounded-2xl p-3 flex items-center gap-3 hover:bg-slate-100 transition-colors">
          <div class="w-8 h-8 bg-green-100 text-green-600 rounded-lg flex items-center justify-center"><i class="fab fa-whatsapp text-sm"></i></div>
          <span class="text-xs font-bold">WhatsApp</span>
        </a>
      </div>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="ui-shell.js"></script>
<script>
'use strict';

document.addEventListener('DOMContentLoaded', () => {
  hydrateDashboard();
});

async function hydrateDashboard() {
  const user = JSON.parse(localStorage.getItem('inv2xl_user') || 'null');
  if (user) {
    document.getElementById('greeting-text').textContent = `Hello, \${user.name.split(' ')[0]}! 👋`;
    const avatar = document.getElementById('dash-user-avatar');
    if (user.avatar) avatar.innerHTML = \`<img src="\${user.avatar}" class="w-full h-full rounded-full object-cover" />\`;
    else avatar.textContent = user.name.charAt(0).toUpperCase();
  }

  const history = JSON.parse(localStorage.getItem('inv2xl_history') || '[]');
  const today = new Date().toDateString();
  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - 6);

  let todaySales = 0;
  let weekRevenue = 0;
  const perDay = {};

  history.forEach(inv => {
    const total = parseFloat(inv.totals?.grandTotal || inv.grand_total || 0);
    const date = new Date(inv.invoiceDate || inv.invoice_date || inv.savedAt);
    if (isNaN(date)) return;

    if (date.toDateString() === today) todaySales += total;
    if (date >= weekStart) weekRevenue += total;

    const key = date.toISOString().slice(0,10);
    perDay[key] = (perDay[key] || 0) + total;
  });

  document.getElementById('kpi-today-sales').textContent = formatINR(todaySales);
  document.getElementById('kpi-week-revenue').textContent = formatINR(weekRevenue);
  document.getElementById('kpi-profit').textContent = formatINR(weekRevenue * 0.25); // 25% est profit
  document.getElementById('kpi-invoices').textContent = history.length;

  renderTrendBars(perDay, weekStart);
}

function renderTrendBars(perDay, start) {
  const wrap = document.getElementById('rev-bars');
  if (!wrap) return;
  wrap.innerHTML = '';
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const key = d.toISOString().slice(0,10);
    days.push({ key, value: perDay[key] || 0 });
  }
  const max = Math.max(...days.map(d => d.value), 1);
  days.forEach(d => {
    const h = 10 + (d.value / max) * 90;
    const bar = document.createElement('div');
    bar.className = 'flex-1 bg-primary/10 rounded-t-lg relative group';
    bar.innerHTML = \`
      <div class="absolute bottom-0 left-0 right-0 bg-primary rounded-t-lg transition-all duration-500" style="height:\${h}%"></div>
      <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-ink text-white text-[10px] px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 transition-opacity">\${formatINR(d.value)}</div>
    \`;
    wrap.appendChild(bar);
  });
}

function formatINR(n) {
  return '₹' + Number(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 });
}

function openQuotation() {
  sessionStorage.setItem('inv2xl_new_type', 'Quotation');
  window.location.href = 'invoice-generator.html';
}

function openExpense() {
  window.location.href = 'tools.html#expense-tracker';
}
</script>

</body>
</html>
